<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#eef2f7;
}

/* HEADER */
header{
  background:#1e3a8a;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* IZQUIERDA */
.header-left{
  position:absolute;
  left:20px;
}

.header-left button{
  background:none;
  border:none;
  color:white;
  margin-right:10px;
  cursor:pointer;
  font-weight:600;
}

/* LOGO */
.logo{
  color:white;
  font-size:26px;
  font-weight:700;
}
.logo span{color:#ff6a00}

/* FORMULARIO */
.auth-box{
  display:none;
  width:300px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.auth-box input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

.auth-box button{
  width:100%;
  padding:10px;
  background:#ff6a00;
  color:white;
  border:none;
  margin-top:5px;
}

/* HERO */
.hero{
  height:400px;
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1920') center/cover;
  display:flex;
  align-items:center;
  padding:40px;
  color:white;
}

/* CATEGORIAS */
.categorias{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px;
}

.cat{
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<header>

  <div class="header-left">
    <button onclick="mostrar('login')">Ingresar</button>
    <button onclick="mostrar('registro')">Registrarse</button>
    <button onclick="mostrar('recuperar')">Recuperar</button>
  </div>

  <div class="logo">NORTE <span>MOTOR</span></div>

</header>

<!-- FORMULARIOS -->
<div id="loginBox" class="auth-box">
  <h3>Ingresar</h3>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
</div>

<div id="registroBox" class="auth-box">
  <h3>Registrarse</h3>
  <input id="email2" placeholder="Email">
  <input id="pass2" type="password" placeholder="Contraseña">
  <button onclick="registro()">Crear cuenta</button>
</div>

<div id="recuperarBox" class="auth-box">
  <h3>Recuperar contraseña</h3>
  <input id="email3" placeholder="Email">
  <button onclick="recuperar()">Enviar</button>
</div>

<section class="hero">
  <h1>Encontrá tu próximo vehículo</h1>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* MOSTRAR FORM */
window.mostrar = (tipo)=>{
  loginBox.style.display="none";
  registroBox.style.display="none";
  recuperarBox.style.display="none";

  if(tipo=="login") loginBox.style.display="block";
  if(tipo=="registro") registroBox.style.display="block";
  if(tipo=="recuperar") recuperarBox.style.display="block";
};

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,pass.value);
    alert("Bienvenido");
  }catch(e){
    alert(e.message);
  }
};

/* REGISTRO */
window.registro = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email2.value,pass2.value);
    alert("Cuenta creada");
  }catch(e){
    alert(e.message);
  }
};

/* RECUPERAR */
window.recuperar = async ()=>{
  try{
    await sendPasswordResetEmail(auth,email3.value);
    alert("Revisá tu email");
  }catch(e){
    alert(e.message);
  }
};

</script>

</body>
</html>
