
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', Arial;
  margin: 0;
  background: #eef2f7;
}

header {
  background: linear-gradient(90deg, #0A1F44, #1e3a8a);
  color: white;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  text-align: center;
}

.container {
  background: white;
  margin: 20px auto;
  padding: 25px;
  border-radius: 12px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  text-align: center;
}

input {
  padding: 12px;
  margin: 8px;
  width: 90%;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 12px 20px;
  margin: 8px;
  background: #F97316;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #ea580c;
}

.cars {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-body {
  padding: 15px;
}

.btn {
  background: #25D366;
  color: white;
  padding: 10px;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
  margin-top: 10px;
}

h3 {
  color: #0A1F44;
}

@media(max-width:768px){
  .container { width: 95%; }
}
</style>
</head>

<body>

<header>
  NORTE MOTOR 🚗
</header>

<div class="container">
  <h3>Login / Registro</h3>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>

  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Login</button>
</div>

<div class="container">
  <h3>Publicar vehículo</h3>
  <input id="nombre" placeholder="Nombre"><br>
  <input id="precio" placeholder="Precio"><br>
  <input id="img" placeholder="URL imagen"><br>
  <input id="telefono" placeholder="Teléfono (549...)"><br>

  <button onclick="publicar()">Publicar</button>
</div>

<div class="container">
  <h3>Mis autos</h3>
  <div id="misAutos"></div>
</div>

<section class="cars" id="cars"></section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.registrar = async function() {
  try {
    await createUserWithEmailAndPassword(auth, email.value, pass.value);
    alert("Usuario creado");
  } catch (e) {
    alert(e.message);
  }
}

window.login = async function() {
  try {
    await signInWithEmailAndPassword(auth, email.value, pass.value);
    alert("Bienvenido");
  } catch (e) {
    alert(e.message);
  }
}

window.publicar = async function() {
  if (!auth.currentUser) {
    alert("Iniciá sesión primero");
    return;
  }

  await addDoc(collection(db, "autos"), {
    nombre: nombre.value,
    precio: precio.value,
    img: img.value,
    telefono: telefono.value,
    user: auth.currentUser.email
  });

  alert("Publicado");
}

window.eliminarAuto = async function(id) {
  await deleteDoc(doc(db, "autos", id));
}

onSnapshot(collection(db, "autos"), (snapshot) => {
  cars.innerHTML = "";
  misAutos.innerHTML = "";

  const user = auth.currentUser;

  snapshot.forEach(d => {
    const auto = d.data();
    const id = d.id;

    cars.innerHTML += `
      <div class="card">
        <img src="${auto.img}">
        <div class="card-body">
          <h3>${auto.nombre}</h3>
          <p>${auto.precio}</p>
          <a class="btn" href="https://wa.me/${auto.telefono}" target="_blank">
            WhatsApp
          </a>
        </div>
      </div>
    `;

    if (user && auto.user === user.email) {
      misAutos.innerHTML += `
        <div class="card">
          <img src="${auto.img}">
          <div class="card-body">
            <h3>${auto.nombre}</h3>
            <p>${auto.precio}</p>
            <button onclick="eliminarAuto('${id}')">Eliminar</button>
          </div>
        </div>
      `;
    }
  });
});
</script>

</body>
</html>
