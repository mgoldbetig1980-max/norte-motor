<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#1e3c72;
    color:white;
    padding:25px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

header span{
    color:#ff7a00;
}

/* CONTENEDOR */
.container{
    display:flex;
    padding:30px;
}

/* PANEL IZQUIERDO */
.left{
    width:220px;
}

.left button{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    border:none;
    background:#ff7a00;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:5px;
}

/* CONTENIDO */
.main{
    flex:1;
    padding-left:30px;
}

/* CATEGORIAS */
.categorias{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.categorias button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#e0e0e0;
    cursor:pointer;
    font-weight:bold;
}

/* FILTROS */
.filtros{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);

    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:15px;
}

.filtros select,
.filtros input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.buscar{
    grid-column: span 4;
    background:#ff7a00;
    color:white;
    border:none;
    padding:12px;
    cursor:pointer;
    font-weight:bold;
    border-radius:5px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .container{
        flex-direction:column;
    }

    .filtros{
        grid-template-columns: repeat(2,1fr);
    }
}
</style>
</head>

<body>

<header>
    NORTE <span>MOTOR</span>
</header>

<div class="container">

    <!-- IZQUIERDA -->
    <div class="left">
        <button>Ingresar</button>
        <button>Registrarse</button>
        <button>Recuperar contraseña</button>
    </div>

    <!-- DERECHA -->
    <div class="main">

        <div class="categorias">
            <button onclick="cargar('autos')">Autos</button>
            <button onclick="cargar('motos')">Motos</button>
            <button onclick="cargar('camiones')">Camiones</button>
            <button onclick="cargar('embarcaciones')">Embarcaciones</button>
        </div>

        <div class="filtros">

            <select id="marca"></select>

            <input placeholder="Versión">

            <select>
                <option>Transmisión</option>
                <option>Manual</option>
                <option>Automática</option>
            </select>

            <select>
                <option>Combustible</option>
                <option>Nafta</option>
                <option>Diesel</option>
                <option>Eléctrico</option>
            </select>

            <select>
                <option>Estado</option>
                <option>Nuevo</option>
                <option>Usado</option>
            </select>

            <input placeholder="Año desde">
            <input placeholder="Año hasta">

            <input placeholder="Precio desde">
            <input placeholder="Precio hasta">

            <input placeholder="KM desde">
            <input placeholder="KM hasta">

            <button class="buscar">Buscar</button>

        </div>

    </div>

</div>

<script>

const marcas = {
    autos: ["Toyota","Ford","Chevrolet","Volkswagen","Fiat","Renault","Peugeot","Citroen","Jeep","Honda","Chery","BYD","Geely","Great Wall"],
    motos: ["Honda","Yamaha","Zanella","Motomel","Corven","Kawasaki","Suzuki","Royal Enfield","CFMoto","Voge"],
    camiones: ["Scania","Iveco","Mercedes-Benz","Volvo","Ford","Foton","JAC","Shacman"],
    embarcaciones: ["Yamaha","Mercury","Honda Marine","Evinrude","Suzuki Marine","Bayliner","Quicksilver"]
};

function cargar(tipo){
    let select = document.getElementById("marca");
    select.innerHTML = "";

    marcas[tipo].forEach(m=>{
        let option = document.createElement("option");
        option.text = m;
        select.add(option);
    });
}

/* CARGA INICIAL */
cargar("autos");

</script>

</body>
</html>
