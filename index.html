
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f1f5f9; }

/* HEADER */
header {
  background:#1e3a8a;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}

nav a {
  color:white;
  margin:10px;
  text-decoration:none;
}

.btn {
  background:#f97316;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}

/* HERO */
.hero {
  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
  url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');
  background-size:cover;
  color:white;
  padding:120px 40px;
}

.hero h1 { font-size:45px; }
.hero p { font-size:30px; font-weight:bold; }

/* BUSCADOR */
.buscador {
  margin-top:20px;
}

.buscador input {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
}

.buscador button {
  background:#f97316;
  color:white;
  padding:10px;
  border:none;
}

/* CATEGORIAS */
.categorias {
  display:flex;
  justify-content:space-around;
  margin-top:-40px;
}

.cat {
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  width:120px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.cat img { width:50px; }

/* SECCION */
.section { padding:30px; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body { padding:10px; }

/* MODAL */
.modal {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input,select {
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>
  <strong>🚗 NORTE MOTOR</strong>
  <nav>
    <a>Inicio</a>
    <a>Autos</a>
    <a>Camionetas</a>
    <a>Motos</a>
    <a>Embarcaciones</a>
  </nav>
  <div>
    <button class="btn" onclick="loginModal.style.display='flex'">Ingresar</button>
    <button class="btn" onclick="abrirPublicar()">Publicar</button>
  </div>
</header>

<section class="hero">
  <h1>Encontrá tu próximo vehículo</h1>
  <p>NORTE MOTOR</p>

  <div class="buscador">
    <input placeholder="¿Qué buscás?">
    <input placeholder="Modelo">
    <input placeholder="Año">
    <input placeholder="Precio Máx">
    <button>Buscar</button>
  </div>
</section>

<section class="categorias">
  <div class="cat">
    <img src="https://cdn-icons-png.flaticon.com/512/743/743922.png">
    <p>Autos</p>
  </div>
  <div class="cat">
    <img src="https://cdn-icons-png.flaticon.com/512/743/743131.png">
    <p>Camionetas</p>
  </div>
  <div class="cat">
    <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
    <p>Motos</p>
  </div>
  <div class="cat">
    <img src="https://cdn-icons-png.flaticon.com/512/2062/2062177.png">
    <p>Embarcaciones</p>
  </div>
</section>

<section class="section">
  <h2>Últimos publicados</h2>
  <div id="cars" class="grid"></div>
</section>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <button onclick="registrar()">Registrarse</button>
    <button onclick="recuperar()">Olvidé contraseña</button>
  </div>
</div>

<!-- PUBLICAR -->
<div class="modal" id="publicarModal">
  <div class="modal-content">
    <h3>Publicar</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="precio" placeholder="Precio">
    <input type="file" id="file">
    <input id="telefono" placeholder="Teléfono">

    <button onclick="publicar()">Publicar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// LOGIN
window.login = () => {
 signInWithEmailAndPassword(auth,email.value,pass.value)
 .then(()=>alert("Bienvenido"))
 .catch(e=>alert(e.message));
};

window.registrar = () => {
 createUserWithEmailAndPassword(auth,email.value,pass.value)
 .then(()=>alert("Usuario creado"))
 .catch(e=>alert(e.message));
};

window.recuperar = () => {
 sendPasswordResetEmail(auth,email.value)
 .then(()=>alert("Revisá tu correo"))
 .catch(e=>alert(e.message));
};

// PUBLICAR
window.abrirPublicar = ()=>{
 if(!auth.currentUser) return alert("Debes iniciar sesión");
 publicarModal.style.display="flex";
};

window.publicar = async ()=>{
 const archivo=file.files[0];
 const refImg=ref(storage,"autos/"+Date.now()+archivo.name);

 await uploadBytes(refImg,archivo);
 const url=await getDownloadURL(refImg);

 await addDoc(collection(db,"autos"),{
  nombre:nombre.value,
  precio:precio.value,
  img:url,
  telefono:telefono.value
 });

 alert("Publicado");
 publicarModal.style.display="none";
};

// MOSTRAR AUTOS
onSnapshot(collection(db,"autos"),snap=>{
 cars.innerHTML="";
 snap.forEach(d=>{
  let a=d.data();

  cars.innerHTML+=`
  <div class="card">
    <img src="${a.img}">
    <div class="card-body">
      <h3>${a.nombre}</h3>
      <p>${a.precio}</p>
      <a class="btn" href="https://wa.me/${a.telefono}" target="_blank">
        Contactar
      </a>
    </div>
  </div>`;
 });
});
</script>

</body>
</html>
