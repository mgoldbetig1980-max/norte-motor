
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins';background:#eef2f7}

header{
background:#1e3a8a;
height:100px;
display:flex;
align-items:center;
justify-content:center;
}
.logo{color:white;font-size:32px;font-weight:700}
.logo span{color:#ff6a00}

.categorias{
display:flex;
justify-content:center;
gap:20px;
margin:20px;
}
.cat{
background:white;
padding:15px 20px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.main{display:flex;padding:20px;gap:20px}

.sidebar{width:240px}

.menu-btn{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:6px;
background:#ff6a00;
color:white;
cursor:pointer;
}

.form{
display:none;
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}
.form input{
width:100%;
padding:10px;
margin:5px 0;
}

.content{flex:1}

#buscador{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

/* 🔥 FIX MARCA */
#marca{
width:220px;
height:45px;
font-size:16px;
}

#buscador input,#buscador select{
padding:10px;
margin:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{padding:10px}
.price{color:#ff6a00;font-weight:700}

/* DETALLE */
#detalle{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000a;
display:none;
}
.detalle-box{
background:white;
margin:50px auto;
padding:20px;
width:80%;
max-width:600px;
}
</style>
</head>

<body>

<header>
<div class="logo">NORTE <span>MOTOR</span></div>
</header>

<div class="categorias">
<div class="cat" onclick="setCategoria('autos')">Autos</div>
<div class="cat" onclick="setCategoria('motos')">Motos</div>
<div class="cat" onclick="setCategoria('camiones')">Camiones</div>
<div class="cat" onclick="setCategoria('embarcaciones')">Embarcaciones</div>
</div>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">

<button class="menu-btn" onclick="mostrar('login')">Ingresar</button>
<button class="menu-btn" onclick="mostrar('registro')">Registrarse</button>
<button class="menu-btn" onclick="mostrar('recuperar')">Recuperar contraseña</button>

<!-- 🔥 SOLO LOGUEADO -->
<div id="panelUsuario" style="display:none">
<button class="menu-btn" onclick="togglePublicar()">Publicar</button>
</div>

<!-- FORMULARIOS -->
<div id="login" class="form">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="loginUser()">Entrar</button>
</div>

<div id="registro" class="form">
<input id="email2" placeholder="Email">
<input id="pass2" type="password">
<button onclick="registroUser()">Crear cuenta</button>
</div>

<div id="recuperar" class="form">
<input id="email3" placeholder="Email">
<button onclick="recuperarPass()">Enviar</button>
</div>

</div>

<!-- CONTENIDO -->
<div class="content">

<div id="buscador">

<select id="marca"></select>
<input id="version" placeholder="Versión">

<select id="transmision">
<option value="">Transmisión</option>
<option>Manual</option>
<option>Automática</option>
</select>

<select id="combustible">
<option value="">Combustible</option>
<option>Nafta</option>
<option>Diésel</option>
<option>Híbrido</option>
<option>Eléctrico</option>
</select>

<select id="estado">
<option value="">Estado</option>
<option>Nuevo</option>
<option>Usado</option>
</select>

<input id="anioMin" placeholder="Año desde">
<input id="anioMax" placeholder="Año hasta">

<input id="precioMin" placeholder="Precio desde">
<input id="precioMax" placeholder="Precio hasta">

<input id="kmMin" placeholder="KM desde">
<input id="kmMax" placeholder="KM hasta">

<button onclick="filtrar()">Buscar</button>

</div>

<div id="autos" class="grid"></div>

</div>

</div>

<!-- DETALLE -->
<div id="detalle">
<div class="detalle-box" id="detalleContenido"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};

const db=getFirestore(app);
const auth=getAuth(app);

let categoria="";

/* 🔥 MARCAS BIEN CARGADAS */
const marcas={
autos:["Toyota","Ford","Chevrolet","Volkswagen","Fiat","Renault","Peugeot","Honda","Nissan","BYD","Chery","Geely"],
motos:["Yamaha","Honda","Zanella","Motomel","Gilera","Royal Enfield","Benelli"],
camiones:["Iveco","Scania","Mercedes-Benz","Volvo","MAN","Foton","JAC","Dongfeng"],
embarcaciones:["Yamaha","Mercury","Honda","Suzuki","Tohatsu"]
};

window.setCategoria=(c)=>{
categoria=c;

marca.innerHTML='<option value="">Marca</option>';

marcas[c].forEach(m=>{
marca.innerHTML+=`<option value="${m}">${m}</option>`;
});

filtrar();
};

/* 🔥 LOGIN */
window.loginUser=async()=>{
await signInWithEmailAndPassword(auth,email.value,pass.value);
alert("Bienvenido");
};

window.registroUser=async()=>{
await createUserWithEmailAndPassword(auth,email2.value,pass2.value);
alert("Cuenta creada");
};

window.recuperarPass=async()=>{
await sendPasswordResetEmail(auth,email3.value);
alert("Revisá tu mail");
};

/* 🔥 MOSTRAR PANEL SOLO LOGUEADO */
onAuthStateChanged(auth,(user)=>{
if(user){
panelUsuario.style.display="block";
}else{
panelUsuario.style.display="none";
}
});

/* UI */
window.mostrar=(id)=>{
document.querySelectorAll(".form").forEach(f=>f.style.display="none");
document.getElementById(id).style.display="block";
};

/* FILTRAR */
window.filtrar=async()=>{
const data=await getDocs(collection(db,"autos"));
autos.innerHTML="";

data.forEach(doc=>{
const a=doc.data();

if(categoria && a.categoria!==categoria)return;
if(marca.value && a.marca!==marca.value)return;
if(version.value && !a.version?.toLowerCase().includes(version.value.toLowerCase()))return;

if(transmision.value && a.transmision!==transmision.value)return;
if(combustible.value && a.combustible!==combustible.value)return;
if(estado.value && a.estado!==estado.value)return;

if(anioMin.value && a.anio<anioMin.value)return;
if(anioMax.value && a.anio>anioMax.value)return;

if(precioMin.value && a.precio<precioMin.value)return;
if(precioMax.value && a.precio>precioMax.value)return;

if(kmMin.value && a.km<kmMin.value)return;
if(kmMax.value && a.km>kmMax.value)return;

autos.innerHTML+=`
<div class="card" onclick="verDetalle('${doc.id}')">
<img src="${a.imagenes?.[0]||''}">
<div class="card-body">
<h3>${a.nombre}</h3>
<div class="price">$${a.precio}</div>
</div>
</div>`;
});
};

/* DETALLE */
window.verDetalle=async(id)=>{
const data=await getDocs(collection(db,"autos"));
data.forEach(doc=>{
if(doc.id===id){
const a=doc.data();

detalle.style.display="block";
detalleContenido.innerHTML=`
<h2>${a.nombre}</h2>
${a.imagenes.map(i=>`<img src="${i}">`).join("")}
<p>${a.descripcion}</p>

<a href="https://wa.me/${a.telefono}" target="_blank">
<button>WhatsApp</button>
</a>

<button onclick="detalle.style.display='none'">Cerrar</button>
`;
}
});
};

filtrar();

</script>

</body>
</html>
