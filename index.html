<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins';background:#eef2f7}
header{background:#1e3a8a;height:90px;display:flex;align-items:center;justify-content:center}
.logo{color:white;font-size:28px;font-weight:700}
.logo span{color:#ff6a00}

.categorias{display:flex;gap:20px;justify-content:center;margin:20px}
.cat{background:white;padding:15px;border-radius:10px;cursor:pointer}

#buscador{background:white;margin:20px;padding:15px;border-radius:10px}
input,select{padding:8px;margin:5px}

.main{display:flex;padding:20px}
.sidebar{width:220px}
.menu-btn{width:100%;padding:10px;margin-bottom:10px;background:#ff6a00;color:white;border:none}

.form{display:none;background:white;padding:10px;border-radius:10px;margin-bottom:10px}

.grid{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:white;border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}

#detalle{position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;display:none}
.detalle-box{background:white;margin:50px auto;padding:20px;width:80%}
</style>
</head>

<body>

<header>
<div class="logo">NORTE <span>MOTOR</span></div>
</header>

<!-- CATEGORIAS -->
<div class="categorias">
<div class="cat" onclick="setCategoria('autos')">Autos</div>
<div class="cat" onclick="setCategoria('motos')">Motos</div>
<div class="cat" onclick="setCategoria('camiones')">Camiones</div>
<div class="cat" onclick="setCategoria('embarcaciones')">Embarcaciones</div>
</div>

<!-- FILTROS -->
<div id="buscador">
<select id="marca"></select>

<input id="anioMin" placeholder="Año desde">
<input id="anioMax" placeholder="Año hasta">

<input id="precioMin" placeholder="Precio desde">
<input id="precioMax" placeholder="Precio hasta">

<input id="kmMin" placeholder="KM desde">
<input id="kmMax" placeholder="KM hasta">

<button onclick="filtrar()">Buscar</button>
</div>

<div class="main">

<div class="sidebar">

<button class="menu-btn" onclick="toggleForm('login')">Ingresar</button>
<button class="menu-btn" onclick="toggleForm('registro')">Registrarse</button>
<button class="menu-btn" onclick="toggleForm('recuperar')">Recuperar contraseña</button>

<div id="loginForm" class="form">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>

<div id="registroForm" class="form">
<input id="email2" placeholder="Email">
<input id="pass2" type="password">
<button onclick="registro()">Crear cuenta</button>
</div>

<div id="recuperarForm" class="form">
<input id="email3" placeholder="Email">
<button onclick="recuperar()">Enviar mail</button>
</div>

</div>

<div id="autos" class="grid"></div>

</div>

<!-- DETALLE -->
<div id="detalle">
<div class="detalle-box" id="detalleContenido"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};

const db=getFirestore(app);
const auth=getAuth(app);

let categoria="";

/* MARCAS POR CATEGORIA */
const marcas={
autos:["Toyota","Ford","Chevrolet","Volkswagen","Fiat","Renault","Peugeot","Honda","Nissan","BYD","Chery"],
motos:["Yamaha","Honda","Zanella","Motomel","Gilera","Royal Enfield","Benelli"],
camiones:["Iveco","Scania","Mercedes-Benz","Volvo","Foton","JAC"],
embarcaciones:["Yamaha","Mercury","Honda","Suzuki"]
};

/* CATEGORIA */
window.setCategoria=(c)=>{
categoria=c;
marca.innerHTML=`<option value="">Marca</option>`;
marcas[c].forEach(m=>{
marca.innerHTML+=`<option>${m}</option>`;
});
filtrar();
};

/* LOGIN */
window.login=async()=>{
await signInWithEmailAndPassword(auth,email.value,pass.value);
alert("Bienvenido");
};

/* REGISTRO */
window.registro=async()=>{
await createUserWithEmailAndPassword(auth,email2.value,pass2.value);
alert("Cuenta creada");
};

/* RECUPERAR */
window.recuperar=async()=>{
await sendPasswordResetEmail(auth,email3.value);
alert("Revisá tu mail");
};

/* UI */
window.toggleForm=(tipo)=>{
loginForm.style.display="none";
registroForm.style.display="none";
recuperarForm.style.display="none";

if(tipo==="login") loginForm.style.display="block";
if(tipo==="registro") registroForm.style.display="block";
if(tipo==="recuperar") recuperarForm.style.display="block";
};

/* FILTRAR */
window.filtrar=async()=>{
const data=await getDocs(collection(db,"autos"));
autos.innerHTML="";

data.forEach(doc=>{
const a=doc.data();

if(categoria && a.categoria!==categoria)return;
if(marca.value && a.marca!==marca.value)return;

if(anioMin.value && a.anio<anioMin.value)return;
if(anioMax.value && a.anio>anioMax.value)return;

if(precioMin.value && a.precio<precioMin.value)return;
if(precioMax.value && a.precio>precioMax.value)return;

if(kmMin.value && a.km<kmMin.value)return;
if(kmMax.value && a.km>kmMax.value)return;

autos.innerHTML+=`
<div class="card" onclick="verDetalle('${doc.id}')">
<img src="${a.imagenes?.[0]||''}">
<h3>${a.nombre}</h3>
<p>$${a.precio}</p>
</div>`;
});
};

/* DETALLE */
window.verDetalle=async(id)=>{
const data=await getDocs(collection(db,"autos"));
data.forEach(doc=>{
if(doc.id===id){
const a=doc.data();

detalle.style.display="block";
detalleContenido.innerHTML=`
<h2>${a.nombre}</h2>
${a.imagenes.map(i=>`<img src="${i}">`).join("")}
<p>${a.descripcion}</p>

<a href="https://wa.me/${a.telefono}" target="_blank">
<button>WhatsApp</button>
</a>

<button onclick="detalle.style.display='none'">Cerrar</button>
`;
}
});
};

filtrar();

</script>

</body>
</html>
