
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', Arial;
  margin: 0;
  background: #eef2f7;
}

header {
  background: linear-gradient(90deg, #0A1F44, #1e3a8a);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
}

.container {
  background: white;
  margin: 20px auto;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

input, select {
  padding: 12px;
  margin: 8px;
  width: 90%;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 12px 20px;
  margin: 8px;
  background: #F97316;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.cars {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-body {
  padding: 15px;
}

.btn {
  background: #25D366;
  color: white;
  padding: 10px;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
}

</style>
</head>

<body>

<header>NORTE MOTOR 🚗</header>

<div class="container">
  <input id="busqueda" placeholder="Buscar..." onkeyup="filtrarAutos()">
  <select id="categoria" onchange="filtrarAutos()">
    <option value="todos">Todas</option>
    <option value="auto">Autos</option>
    <option value="camioneta">Camionetas</option>
    <option value="moto">Motos</option>
    <option value="embarcacion">Embarcaciones</option>
  </select>
</div>

<div class="container">
  <h3>Login</h3>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password"><br>
  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Login</button>
</div>

<div class="container">
  <h3>Publicar</h3>
  <input id="nombre" placeholder="Nombre"><br>
  <input id="precio" placeholder="Precio"><br>
  <input id="img" placeholder="URL imagen"><br>
  <input id="telefono" placeholder="Teléfono"><br>

  <select id="categoriaInput">
    <option value="auto">Auto</option>
    <option value="camioneta">Camioneta</option>
    <option value="moto">Moto</option>
    <option value="embarcacion">Embarcación</option>
  </select>

  <button onclick="publicar()">Publicar</button>
</div>

<div class="container">
  <h3>Mis autos</h3>
  <div id="misAutos"></div>
</div>

<section class="cars" id="cars"></section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let listaAutos = [];

window.registrar = async () => {
  await createUserWithEmailAndPassword(auth, email.value, pass.value);
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, pass.value);
};

window.publicar = async () => {
  if (!auth.currentUser) return alert("Login primero");

  await addDoc(collection(db,"autos"), {
    nombre: nombre.value,
    precio: precio.value,
    img: img.value,
    telefono: telefono.value,
    categoria: categoriaInput.value,
    user: auth.currentUser.email
  });
};

window.eliminarAuto = async (id) => {
  await deleteDoc(doc(db,"autos",id));
};

onSnapshot(collection(db,"autos"), snap => {
  listaAutos = [];
  snap.forEach(d => {
    let a = d.data();
    a.id = d.id;
    listaAutos.push(a);
  });
  mostrarAutos(listaAutos);
});

function filtrarAutos(){
  let texto = busqueda.value.toLowerCase();
  let cat = categoria.value;

  let filtrados = listaAutos.filter(a =>
    a.nombre.toLowerCase().includes(texto) &&
    (cat==="todos" || a.categoria===cat)
  );

  mostrarAutos(filtrados);
}

function mostrarAutos(lista){
  cars.innerHTML="";
  misAutos.innerHTML="";
  let user = auth.currentUser;

  lista.forEach(a=>{
    cars.innerHTML+=`
      <div class="card">
        <img src="${a.img}">
        <div class="card-body">
          <h3>${a.nombre}</h3>
          <p>${a.precio}</p>
          <p>📌 ${a.categoria}</p>
          <a class="btn" href="https://wa.me/${a.telefono}" target="_blank">WhatsApp</a>
        </div>
      </div>
    `;

    if(user && user.email===a.user){
      misAutos.innerHTML+=`
        <div class="card">
          <img src="${a.img}">
          <div class="card-body">
            <h3>${a.nombre}</h3>
            <button onclick="eliminarAuto('${a.id}')">Eliminar</button>
          </div>
        </div>
      `;
    }
  });
}
</script>

</body>
</html>
