<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f6f9;
}

/* HEADER */
.header{
    height:260px;
    background:url('/img/banner.jpg') center/cover no-repeat;
    position:relative;
}
.header::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
}
.nav{
    position:absolute;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    z-index:2;
}
.logo{
    font-size:28px;
    font-weight:bold;
    color:white;
}
.logo span{color:#ff7a00;}
.menu a{
    color:white;
    margin-left:20px;
    text-decoration:none;
}

/* LAYOUT */
.container{
    display:flex;
    padding:30px;
}
.left{
    width:220px;
}
.left button{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    background:#ff7a00;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.main{
    flex:1;
    padding-left:30px;
}

/* CATEGORIAS */
.categorias{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
.categorias button{
    padding:10px 20px;
    border:none;
    background:#ddd;
    border-radius:5px;
    cursor:pointer;
}

/* FILTROS */
.filtros{
    background:white;
    padding:20px;
    border-radius:10px;
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
    margin-bottom:30px;
}
.filtros input,.filtros select{
    padding:10px;
}
.buscar{
    grid-column: span 4;
    background:#ff7a00;
    color:white;
    border:none;
    padding:12px;
}

/* VEHICULOS */
.grid{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.2s;
}
.card:hover{
    transform:scale(1.03);
}
.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}
.card-body{
    padding:15px;
}
.precio{
    color:#ff7a00;
    font-weight:bold;
}

/* RESPONSIVE */
@media(max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr);}
    .filtros{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="header">
    <div class="nav">
        <div class="logo">NORTE <span>MOTOR</span></div>
        <div class="menu">
            <a href="#">Inicio</a>
            <a href="#">Autos</a>
            <a href="#">Camionetas</a>
            <a href="#">Motos</a>
        </div>
    </div>
</div>

<div class="container">

<div class="left"></div>

<div class="main">

<div class="categorias">
<button onclick="cargar('autos')">Autos</button>
<button onclick="cargar('motos')">Motos</button>
<button onclick="cargar('camiones')">Camiones</button>
<button onclick="cargar('embarcaciones')">Embarcaciones</button>
</div>

<div class="filtros">
<select id="marca"></select>
<input placeholder="Versión">
<select><option>Transmisión</option></select>
<select><option>Combustible</option></select>
<select><option>Estado</option></select>
<input placeholder="Año desde">
<input placeholder="Año hasta">
<input placeholder="Precio desde">
<input placeholder="Precio hasta">
<input placeholder="KM desde">
<input placeholder="KM hasta">
<button class="buscar">Buscar</button>
</div>

<h2>Vehículos publicados</h2>
<div class="grid" id="listado"></div>

</div>
</div>

<script>

/* LOGIN */
function actualizarUI(){
let user = localStorage.getItem("session");
let left = document.querySelector(".left");

if(user){
left.innerHTML = `
<button onclick="logout()">Cerrar sesión</button>
<button onclick="publicar()">Publicar</button>
`;
}else{
left.innerHTML = `
<button onclick="login()">Ingresar</button>
<button onclick="registrar()">Registrarse</button>
<button onclick="recuperar()">Recuperar contraseña</button>
`;
}
}

function login(){
let email = prompt("Email");
let pass = prompt("Contraseña");
let users = JSON.parse(localStorage.getItem("usuarios")) || [];
let ok = users.find(u=>u.email===email && u.pass===pass);
if(ok){
localStorage.setItem("session",email);
actualizarUI();
}else alert("Error");
}

function registrar(){
let email = prompt("Email");
let pass = prompt("Contraseña");
let users = JSON.parse(localStorage.getItem("usuarios")) || [];
users.push({email,pass});
localStorage.setItem("usuarios",JSON.stringify(users));
alert("Registrado");
}

function recuperar(){
alert("Función en desarrollo");
}

function logout(){
localStorage.removeItem("session");
actualizarUI();
}

/* PUBLICAR */
function publicar(){

let marca = prompt("Marca");
let modelo = prompt("Modelo");
let año = prompt("Año");
let km = prompt("Kilometraje");
let combustible = prompt("Combustible");
let transmision = prompt("Transmisión");
let precio = prompt("Precio");
let tel = prompt("WhatsApp vendedor");
let img = prompt("URL imagen");
let desc = prompt("Descripción");

let autos = JSON.parse(localStorage.getItem("autos")) || [];

autos.push({
marca,
modelo,
año,
km,
combustible,
transmision,
precio,
tel,
img,
desc,
fecha:new Date().getTime()
});

localStorage.setItem("autos",JSON.stringify(autos));
render();
}

/* DETALLE */
function verDetalle(index){
localStorage.setItem("detalle", index);
window.location.href = "detalle.html";
}

/* LISTADO */
function render(){
let cont = document.getElementById("listado");
cont.innerHTML="";

let autos = JSON.parse(localStorage.getItem("autos")) || [];

if(autos.length===0){
autos = [
{titulo:"Toyota Hilux",precio:"20.000 USD",img:"https://images.unsplash.com/photo-1552519507-da3b142c6e3d",tel:"341111111"},
{titulo:"Ford Ranger",precio:"18.000 USD",img:"https://images.unsplash.com/photo-1549921296-3a6b0d64c9f6",tel:"341222222"}
];
}

autos.forEach((a,i)=>{
cont.innerHTML += `
<div class="card" onclick="verDetalle(${i})">
<img src="${a.img}">
<div class="card-body">
<h3>${a.titulo}</h3>
<div class="precio">${a.precio}</div>
</div>
</div>
`;
});
}

/* MARCAS */
const marcas = {
autos:["Toyota","Ford","Volkswagen","Chevrolet","Fiat","Renault","Peugeot","Chery","BYD","Geely"],
motos:["Honda","Yamaha","Zanella","Motomel","CFMoto"],
camiones:["Scania","Iveco","Volvo","Foton","JAC"],
embarcaciones:["Yamaha","Mercury","Honda Marine"]
};

function cargar(tipo){
let select = document.getElementById("marca");
select.innerHTML="";
marcas[tipo].forEach(m=>{
let op=document.createElement("option");
op.text=m;
select.add(op);
});
}

/* INIT */
cargar("autos");
actualizarUI();
render()
    <h3>${a.marca} ${a.modelo}</h3>
<p>${a.año} - ${a.km} km</p>

</script>

</body>
</html>
