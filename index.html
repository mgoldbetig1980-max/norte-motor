<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f4f6f9;
}

/* HEADER */
header{
  background:#1e3a8a;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:24px;
  font-weight:700;
  color:white;
}
.logo span{
  color:#ff6a00;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
}

.btn{
  background:#ff6a00;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  cursor:pointer;
}

/* HERO */
.hero{
  position:relative;
  height:520px;
  display:flex;
  align-items:center;
  padding:60px;
  color:white;
  background-image:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1920');
  background-size:cover;
  background-position:center;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.hero > div{
  position:relative;
  z-index:2;
}

.hero h1{
  font-size:48px;
  margin-bottom:10px;
}
.hero h2{
  font-weight:400;
  margin-bottom:20px;
}

/* BUSCADOR */
.search-box{
  display:flex;
  gap:10px;
  background:white;
  padding:15px;
  border-radius:10px;
}
.search-box input{
  border:none;
  padding:10px;
  width:150px;
}

/* CATEGORIAS PRO */
.categorias{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:-50px;
}

.cat{
  background:white;
  width:200px;
  padding:25px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
  transition:0.3s;
}

.cat:hover{
  transform:translateY(-5px);
}

.cat img{
  width:60px;
  margin-bottom:10px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body{
  padding:15px;
}

.price{
  color:#ff6a00;
  font-weight:700;
}

/* FOOTER */
.footer{
  background:#1e3a8a;
  color:white;
  padding:30px;
  text-align:center;
}

/* MODAL LOGIN */
.modal{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:30px;
  border-radius:10px;
}

.modal input{
  display:block;
  margin:10px 0;
  padding:10px;
  width:250px;
}

</style>
</head>

<body>

<header>
  <div class="logo">NORTE <span>MOTOR</span></div>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Autos</a>
    <a href="#">Camionetas</a>
    <a href="#">Motos</a>
    <a href="#">Embarcaciones</a>
  </nav>

  <div>
    <button class="btn" onclick="abrirLogin()">Ingresar</button>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Encontrá tu próximo vehículo</h1>
    <h2>NORTE MOTOR</h2>

    <div class="search-box">
      <input placeholder="¿Qué buscás?">
      <input placeholder="Modelo">
      <input placeholder="Año">
      <input placeholder="Precio Máx">
      <button class="btn">Buscar</button>
    </div>
  </div>
</section>

<!-- CATEGORIAS CON ICONOS REALES -->
<div class="categorias">

  <div class="cat">
    <img src="https://cdn-icons-png.flaticon.com/512/743/743922.png">
    <h3>Autos</h3>
  </div>

  <div class="cat">
    <img src="https://cdn-icons-png.flaticon.com/512/741/741407.png">
    <h3>Camionetas</h3>
  </div>

  <div class="cat">
    <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
    <h3>Motos</h3>
  </div>

  <div class="cat">
    <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png">
    <h3>Embarcaciones</h3>
  </div>

</div>

<h2 style="padding:40px;">Vehículos Destacados</h2>

<div id="autos" class="grid"></div>

<div class="footer">
  © Norte Motor
</div>

<!-- LOGIN -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()" class="btn">Ingresar</button>
    <button onclick="registro()" class="btn">Registrarse</button>
    <button onclick="recuperar()" class="btn">Olvidé contraseña</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.abrirLogin = ()=> modal.style.display="flex";

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,pass.value);
  alert("Bienvenido");
}

window.registro = async ()=>{
  await createUserWithEmailAndPassword(auth,email.value,pass.value);
  alert("Registrado");
}

window.recuperar = async ()=>{
  await sendPasswordResetEmail(auth,email.value);
  alert("Revisá tu mail");
}

async function cargarAutos(){
  const querySnapshot = await getDocs(collection(db,"autos"));
  autos.innerHTML="";
  querySnapshot.forEach(doc=>{
    const a = doc.data();
    autos.innerHTML+=`
      <div class="card">
        <img src="${a.imagen}">
        <div class="card-body">
          <h3>${a.nombre}</h3>
          <div class="price">$${a.precio}</div>
        </div>
      </div>
    `;
  });
}

cargarAutos();

</script>

</body>
</html>
