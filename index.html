<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f6f9;
}

/* HEADER CON BANNER */
.header{
    height:260px;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover no-repeat;
    position:relative;
}

.header::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
}

.nav{
    position:absolute;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    z-index:2;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:white;
}

.logo span{
    color:#ff7a00;
}

.menu a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-weight:bold;
}

/* CONTENEDOR */
.container{
    display:flex;
    padding:30px;
}

/* IZQUIERDA */
.left{
    width:220px;
}

.left button{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    border:none;
    background:#ff7a00;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:5px;
}

/* MAIN */
.main{
    flex:1;
    padding-left:30px;
}

/* CATEGORIAS */
.categorias{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.categorias button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#e0e0e0;
    cursor:pointer;
    font-weight:bold;
}

/* FILTROS */
.filtros{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);

    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:15px;
}

.filtros select,
.filtros input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.buscar{
    grid-column: span 4;
    background:#ff7a00;
    color:white;
    border:none;
    padding:12px;
    cursor:pointer;
    font-weight:bold;
    border-radius:5px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .container{
        flex-direction:column;
    }

    .filtros{
        grid-template-columns: repeat(2,1fr);
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="nav">
        <div class="logo">
            NORTE <span>MOTOR</span>
        </div>

        <div class="menu">
            <a href="#">Inicio</a>
            <a href="#">Autos</a>
            <a href="#">Camionetas</a>
            <a href="#">Motos</a>
            <a href="#">Embarcaciones</a>
        </div>
    </div>
</div>

<!-- CONTENIDO -->
<div class="container">

    <!-- PANEL IZQUIERDO -->
    <div class="left"></div>

    <!-- CONTENIDO -->
    <div class="main">

        <div class="categorias">
            <button onclick="cargar('autos')">Autos</button>
            <button onclick="cargar('motos')">Motos</button>
            <button onclick="cargar('camiones')">Camiones</button>
            <button onclick="cargar('embarcaciones')">Embarcaciones</button>
        </div>

        <div class="filtros">

            <select id="marca"></select>

            <input placeholder="Versión">

            <select>
                <option>Transmisión</option>
                <option>Manual</option>
                <option>Automática</option>
            </select>

            <select>
                <option>Combustible</option>
                <option>Nafta</option>
                <option>Diesel</option>
                <option>Eléctrico</option>
            </select>

            <select>
                <option>Estado</option>
                <option>Nuevo</option>
                <option>Usado</option>
            </select>

            <input placeholder="Año desde">
            <input placeholder="Año hasta">

            <input placeholder="Precio desde">
            <input placeholder="Precio hasta">

            <input placeholder="KM desde">
            <input placeholder="KM hasta">

            <button class="buscar">Buscar</button>

        </div>

    </div>

</div>

<script>

/* LOGIN / USUARIOS */

function registrar(){
    let email = prompt("Email");
    let pass = prompt("Contraseña");

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
    usuarios.push({email, pass});
    localStorage.setItem("usuarios", JSON.stringify(usuarios));

    alert("Registrado");
}

function login(){
    let email = prompt("Email");
    let pass = prompt("Contraseña");

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    let user = usuarios.find(u => u.email === email && u.pass === pass);

    if(user){
        localStorage.setItem("session", email);
        actualizarUI();
        alert("Bienvenido");
    }else{
        alert("Error");
    }
}

function logout(){
    localStorage.removeItem("session");
    actualizarUI();
}

function recuperar(){
    alert("Te enviaremos instrucciones por email");
}

function actualizarUI(){
    let user = localStorage.getItem("session");
    let left = document.querySelector(".left");

    if(user){
        left.innerHTML = `
            <button onclick="logout()">Cerrar sesión</button>
            <button onclick="publicar()">Publicar</button>
        `;
    }else{
        left.innerHTML = `
            <button onclick="login()">Ingresar</button>
            <button onclick="registrar()">Registrarse</button>
            <button onclick="recuperar()">Recuperar contraseña</button>
        `;
    }
}

/* PUBLICAR */

function publicar(){
    let titulo = prompt("Título");
    let precio = prompt("Precio");

    let autos = JSON.parse(localStorage.getItem("autos")) || [];

    autos.push({
        titulo,
        precio,
        fecha: new Date().getTime()
    });

    localStorage.setItem("autos", JSON.stringify(autos));
    alert("Publicado (30 días activo)");
}

/* LIMPIEZA 30 DIAS */

function limpiar(){
    let ahora = new Date().getTime();
    let autos = JSON.parse(localStorage.getItem("autos")) || [];

    autos = autos.filter(a => {
        let dias = (ahora - a.fecha) / (1000*60*60*24);
        return dias < 30;
    });

    localStorage.setItem("autos", JSON.stringify(autos));
}

/* MARCAS */

const marcas = {
    autos: ["Toyota","Ford","Chevrolet","Volkswagen","Fiat","Renault","Peugeot","Citroen","Jeep","Honda","Chery","BYD","Geely","Great Wall"],
    motos: ["Honda","Yamaha","Zanella","Motomel","Kawasaki","Suzuki","CFMoto","Voge"],
    camiones: ["Scania","Iveco","Mercedes-Benz","Volvo","Ford","Foton","JAC","Shacman"],
    embarcaciones: ["Yamaha","Mercury","Honda Marine","Suzuki Marine","Bayliner","Quicksilver"]
};

function cargar(tipo){
    let select = document.getElementById("marca");
    select.innerHTML = "";

    marcas[tipo].forEach(m=>{
        let option = document.createElement("option");
        option.text = m;
        select.add(option);
    });
}

/* INIT */

cargar("autos");
actualizarUI();
limpiar();

</script>

</body>
</html>
</html>
