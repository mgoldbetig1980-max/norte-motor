
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* TOP */
.topbar {
  background:#f97316;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* MENU */
.menu {
  background:#1e293b;
  display:flex;
  padding:10px;
  gap:20px;
}

/* LAYOUT */
.main {
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#020617;
  padding:20px;
}

.sidebar input, .sidebar select {
  width:100%;
  padding:10px;
  margin:5px 0;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#f97316;
  border:none;
  color:white;
  cursor:pointer;
}

/* CONTENT */
.content {
  flex:1;
  padding:20px;
}

/* GRID */
.cars {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body {
  padding:10px;
}

/* BOTON */
.btn {
  background:#25D366;
  padding:8px;
  display:inline-block;
  color:white;
  text-decoration:none;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="topbar">NORTE MOTOR 🚗</div>

<div class="menu">
  <div>Autos</div>
  <div>Camionetas</div>
  <div>Motos</div>
  <div>Embarcaciones</div>
</div>

<div class="main">

<div class="sidebar">
  <h3>Usuario</h3>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>
  <button onclick="registrar()">Registrarse</button>

  <button onclick="recuperar()">🔑 Olvidé mi contraseña</button>

  <hr>

  <h3>Publicar</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input type="file" id="file">
  <input id="telefono" placeholder="Teléfono">

  <select id="categoriaInput">
    <option value="auto">Auto</option>
    <option value="camioneta">Camioneta</option>
    <option value="moto">Moto</option>
    <option value="embarcacion">Embarcación</option>
  </select>

  <button onclick="publicar()">Publicar</button>
</div>

<div class="content">
  <h2>Vehículos disponibles</h2>
  <div class="cars" id="cars"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.appspot.com",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// LOGIN
window.login = () => {
  signInWithEmailAndPassword(auth,email.value,pass.value)
  .then(()=>alert("Bienvenido"))
  .catch(e=>alert(e.message));
};

// REGISTRO
window.registrar = () => {
  createUserWithEmailAndPassword(auth,email.value,pass.value)
  .then(()=>alert("Cuenta creada"))
  .catch(e=>alert(e.message));
};

// 🔑 RECUPERAR CONTRASEÑA
window.recuperar = () => {
  if (!email.value) return alert("Ingresá tu email");

  sendPasswordResetEmail(auth,email.value)
  .then(()=>alert("Te enviamos un mail para recuperar la contraseña"))
  .catch(e=>alert(e.message));
};

// PUBLICAR
window.publicar = async () => {
  if (!auth.currentUser) return alert("Primero iniciá sesión");

  const archivo = file.files[0];
  const refImg = ref(storage,"autos/"+Date.now()+archivo.name);

  await uploadBytes(refImg,archivo);
  const url = await getDownloadURL(refImg);

  await addDoc(collection(db,"autos"),{
    nombre:nombre.value,
    precio:precio.value,
    img:url,
    telefono:telefono.value,
    categoria:categoriaInput.value
  });

  alert("Publicado");
};

// MOSTRAR AUTOS
onSnapshot(collection(db,"autos"),snap=>{
  cars.innerHTML="";

  snap.forEach(d=>{
    let a=d.data();

    cars.innerHTML+=`
    <div class="card">
      <img src="${a.img}">
      <div class="card-body">
        <h3>${a.nombre}</h3>
        <p>${a.precio}</p>
        <a class="btn" href="https://wa.me/${a.telefono}" target="_blank">
          WhatsApp
        </a>
      </div>
    </div>`;
  });
});
</script>

</body>
</html>
