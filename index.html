
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f3f4f6; }

/* HEADER */
header {
  background:#1e3a8a;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

nav a {
  color:white;
  margin:10px;
  text-decoration:none;
}

.btn-naranja {
  background:#f97316;
  border:none;
  padding:10px;
  color:white;
  cursor:pointer;
}

/* HERO */
.hero {
  background:url('https://images.unsplash.com/photo-1549921296-3a6bfe57a0a9') center/cover;
  color:white;
  text-align:center;
  padding:100px 20px;
}

/* CATEGORIAS */
.categorias {
  display:flex;
  justify-content:space-around;
  padding:20px;
}

.categorias div {
  background:white;
  padding:20px;
  border-radius:10px;
}

/* SECTIONS */
.section { padding:20px; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body {
  padding:10px;
}

.btn {
  background:#f97316;
  color:white;
  padding:10px;
  display:block;
  text-align:center;
  text-decoration:none;
}

/* FOOTER */
footer {
  background:#1e3a8a;
  color:white;
  text-align:center;
  padding:20px;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>
  <strong>🚗 NORTE MOTOR</strong>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Autos</a>
    <a href="#">Camionetas</a>
    <a href="#">Motos</a>
    <a href="#">Embarcaciones</a>
  </nav>
  <button class="btn-naranja" onclick="abrirLogin()">Ingresar</button>
</header>

<section class="hero">
  <h1>Encontrá tu próximo vehículo</h1>
  <p>NORTE MOTOR</p>
</section>

<section class="categorias">
  <div>🚗 Autos</div>
  <div>🚙 Camionetas</div>
  <div>🏍️ Motos</div>
  <div>🚤 Embarcaciones</div>
</section>

<section class="section">
  <h2>Últimos publicados</h2>
  <div id="cars" class="grid"></div>
</section>

<footer>
  © Norte Motor - Todos los derechos reservados
</footer>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <button onclick="registrar()">Registrarse</button>
    <button onclick="recuperar()">Olvidé contraseña</button>
  </div>
</div>

<!-- PUBLICAR -->
<div class="modal" id="publicarModal">
  <div class="modal-content">
    <h3>Publicar</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="precio" placeholder="Precio">
    <input type="file" id="file">
    <input id="telefono" placeholder="Teléfono">

    <select id="categoriaInput">
      <option value="auto">Auto</option>
      <option value="camioneta">Camioneta</option>
      <option value="moto">Moto</option>
      <option value="embarcacion">Embarcación</option>
    </select>

    <button onclick="publicar()">Publicar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

window.abrirLogin = ()=> loginModal.style.display="flex";

window.login = ()=> signInWithEmailAndPassword(auth,email.value,pass.value);
window.registrar = ()=> createUserWithEmailAndPassword(auth,email.value,pass.value);
window.recuperar = ()=> sendPasswordResetEmail(auth,email.value);

window.publicar = async ()=>{
 if(!auth.currentUser) return alert("Debes iniciar sesión");

 const archivo=file.files[0];
 const refImg=ref(storage,"autos/"+Date.now()+archivo.name);

 await uploadBytes(refImg,archivo);
 const url=await getDownloadURL(refImg);

 await addDoc(collection(db,"autos"),{
  nombre:nombre.value,
  precio:precio.value,
  img:url,
  telefono:telefono.value
 });

 alert("Publicado");
 publicarModal.style.display="none";
};

onSnapshot(collection(db,"autos"),snap=>{
 cars.innerHTML="";
 snap.forEach(d=>{
  let a=d.data();

  cars.innerHTML+=`
  <div class="card">
    <img src="${a.img}">
    <div class="card-body">
      <h3>${a.nombre}</h3>
      <p>${a.precio}</p>
      <a class="btn" href="https://wa.me/${a.telefono}" target="_blank">
        Contactar
      </a>
    </div>
  </div>`;
 });
});
</script>

</body>
</html>
