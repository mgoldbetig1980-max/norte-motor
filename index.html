<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Poppins';
  background:#eef2f7;
}

/* HEADER */
header{
  background:#1e3a8a;
  height:90px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.logo{
  color:white;
  font-size:26px;
  font-weight:700;
}
.logo span{color:#ff6a00}

/* HERO */
.hero{
  height:350px;
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1920') center/cover;
  display:flex;
  align-items:center;
  padding:40px;
  color:white;
}

/* CATEGORIAS */
.categorias{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px;
}

.cat{
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  width:150px;
}

.cat i{
  font-size:30px;
  color:#1e3a8a;
}

/* LAYOUT PRINCIPAL */
.main{
  display:flex;
  gap:20px;
  padding:20px;
}

/* LOGIN IZQUIERDA */
.sidebar{
  width:250px;
  background:white;
  padding:20px;
  border-radius:10px;
}

.sidebar h3{
  margin-top:0;
}

.sidebar input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#ff6a00;
  border:none;
  color:white;
}

/* AUTOS */
.content{
  flex:1;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  color:#ff6a00;
  font-weight:700;
}

</style>
</head>

<body>

<header>
  <div class="logo">NORTE <span>MOTOR</span></div>
</header>

<section class="hero">
  <h1>Encontrá tu próximo vehículo</h1>
</section>

<!-- CATEGORIAS -->
<div class="categorias">
  <div class="cat"><i class="fas fa-car"></i><p>Autos</p></div>
  <div class="cat"><i class="fas fa-truck"></i><p>Camionetas</p></div>
  <div class="cat"><i class="fas fa-motorcycle"></i><p>Motos</p></div>
  <div class="cat"><i class="fas fa-ship"></i><p>Embarcaciones</p></div>
  <div class="cat"><i class="fas fa-truck-moving"></i><p>Camiones</p></div>
</div>

<!-- CONTENIDO -->
<div class="main">

  <!-- IZQUIERDA LOGIN -->
  <div class="sidebar">
    <h3>Acceso</h3>

    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
    <button onclick="registro()">Registrarse</button>
    <button onclick="recuperar()">Recuperar contraseña</button>
  </div>

  <!-- DERECHA AUTOS -->
  <div class="content">
    <div id="autos" class="grid"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,pass.value);
    alert("Bienvenido");
  }catch(e){
    alert(e.message);
  }
};

/* REGISTRO */
window.registro = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,pass.value);
    alert("Cuenta creada");
  }catch(e){
    alert(e.message);
  }
};

/* RECUPERAR */
window.recuperar = async ()=>{
  try{
    await sendPasswordResetEmail(auth,email.value);
    alert("Revisá tu mail");
  }catch(e){
    alert(e.message);
  }
};

/* AUTOS */
async function cargarAutos(){
  const data = await getDocs(collection(db,"autos"));
  autos.innerHTML="";
  data.forEach(doc=>{
    const a = doc.data();
    autos.innerHTML+=`
      <div class="card">
        <img src="${a.imagen}">
        <div class="card-body">
          <h3>${a.nombre}</h3>
          <div class="price">$${a.precio}</div>
        </div>
      </div>`;
  });
}

cargarAutos();

</script>

</body>
</html>
