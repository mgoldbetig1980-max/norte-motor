<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:'Poppins';background:#eef2f7}

/* HEADER */
header{background:#1e3a8a;padding:15px 60px;display:flex;justify-content:space-between;align-items:center}
.logo{color:white;font-weight:700}
.logo span{color:#ff6a00}
nav a{color:white;margin:0 10px;text-decoration:none}
.btn{background:#ff6a00;color:white;border:none;padding:10px;border-radius:6px;cursor:pointer}

/* HERO */
.hero{height:400px;background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1920') center/cover;display:flex;align-items:center}
.hero h1{color:white;padding-left:60px}

/* CATEGORIAS */
.categorias{display:flex;gap:20px;justify-content:center;margin:30px}
.cat{background:white;padding:20px;border-radius:10px;text-align:center}
.cat i{font-size:30px;color:#1e3a8a}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px}
.card{background:white;border-radius:10px;overflow:hidden}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:10px}
.price{color:#ff6a00;font-weight:700}

/* PANEL */
.panel{display:none;padding:30px}
.panel input{display:block;margin:10px 0;padding:10px}

/* MODAL */
.modal{position:fixed;width:100%;height:100%;background:#0008;display:none;justify-content:center;align-items:center}
.modal-content{background:white;padding:20px;border-radius:10px}
</style>
</head>

<body>

<header>
<div class="logo">NORTE <span>MOTOR</span></div>
<nav>
<a>Inicio</a><a>Autos</a><a>Motos</a>
</nav>
<div>
<button class="btn" onclick="loginModal.style.display='flex'">Ingresar</button>
<button class="btn" onclick="abrirPanel()">Mi Panel</button>
</div>
</header>

<section class="hero">
<h1>Encontrá tu vehículo</h1>
</section>

<div class="categorias">
<div class="cat"><i class="fas fa-car"></i><p>Autos</p></div>
<div class="cat"><i class="fas fa-truck"></i><p>Camionetas</p></div>
<div class="cat"><i class="fas fa-motorcycle"></i><p>Motos</p></div>
<div class="cat"><i class="fas fa-ship"></i><p>Embarcaciones</p></div>
</div>

<div id="autos" class="grid"></div>

<!-- PANEL -->
<div id="panel" class="panel">
<h2>Publicar vehículo</h2>
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input type="file" id="file">
<button class="btn" onclick="publicar()">Publicar</button>

<h3>Mis publicaciones</h3>
<div id="misAutos"></div>
</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
<div class="modal-content">
<input id="email" placeholder="Email">
<input id="pass" type="password">
<button onclick="login()">Ingresar</button>
<button onclick="registro()">Registro</button>
<button onclick="recuperar()">Recuperar</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
 apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* LOGIN */
window.login = ()=> signInWithEmailAndPassword(auth,email.value,pass.value);
window.registro = ()=> createUserWithEmailAndPassword(auth,email.value,pass.value);
window.recuperar = ()=> sendPasswordResetEmail(auth,email.value);

/* PANEL */
window.abrirPanel = ()=>{
 if(!auth.currentUser) return alert("Iniciá sesión");
 panel.style.display="block";
};

/* PUBLICAR */
window.publicar = async ()=>{
 const archivo = file.files[0];
 const refImg = ref(storage,"autos/"+Date.now()+archivo.name);
 await uploadBytes(refImg,archivo);
 const url = await getDownloadURL(refImg);

 await addDoc(collection(db,"autos"),{
  nombre:nombre.value,
  precio:precio.value,
  imagen:url,
  user:auth.currentUser.email
 });

 cargarAutos();
 cargarMisAutos();
};

/* LISTAR TODOS */
async function cargarAutos(){
 const data = await getDocs(collection(db,"autos"));
 autos.innerHTML="";
 data.forEach(d=>{
  let a=d.data();
  autos.innerHTML+=`
  <div class="card">
    <img src="${a.imagen}">
    <div class="card-body">
      <h3>${a.nombre}</h3>
      <div class="price">$${a.precio}</div>
    </div>
  </div>`;
 });
}

/* MIS AUTOS */
async function cargarMisAutos(){
 const q=query(collection(db,"autos"), where("user","==",auth.currentUser.email));
 const data=await getDocs(q);
 misAutos.innerHTML="";
 data.forEach(d=>{
  let a=d.data();
  misAutos.innerHTML+=`
  <div>
    ${a.nombre} - $${a.precio}
    <button onclick="eliminar('${d.id}')">❌</button>
    <button onclick="editar('${d.id}','${a.nombre}','${a.precio}')">✏️</button>
  </div>`;
 });
}

/* ELIMINAR */
window.eliminar = async(id)=>{
 await deleteDoc(doc(db,"autos",id));
 cargarAutos(); cargarMisAutos();
};

/* EDITAR */
window.editar = async(id,n,p)=>{
 const nombreNuevo = prompt("Nombre",n);
 const precioNuevo = prompt("Precio",p);

 await updateDoc(doc(db,"autos",id),{
  nombre:nombreNuevo,
  precio:precioNuevo
 });

 cargarAutos(); cargarMisAutos();
};

onAuthStateChanged(auth,user=>{
 if(user){
  cargarAutos();
  cargarMisAutos();
 }
});

cargarAutos();

</script>

</body>
</html>
