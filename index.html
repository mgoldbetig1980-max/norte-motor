<!DOCTYPE html>
<html>
<head>
  <title>Norte Motor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #0A1F44;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .logo {
      font-weight: bold;
      color: orange;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1549921296-3ecf0f6d8b73');
      background-size: cover;
      padding: 100px 20px;
      color: white;
    }

    .btn {
      background: #F97316;
      padding: 10px 20px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">NORTE MOTOR</div>
  <div>Autos | Camionetas | Motos | Embarcaciones</div>
</header>

<section class="hero">
  <h1>Encontrá tu próximo vehículo</h1>
  <a class="btn" href="#">Buscar</a>
</section>

<section class="grid">
  <div class="card">
    <h3>Auto ejemplo</h3>
    <p>$10.000</p>
    <a class="btn" href="https://wa.me/549341XXXXXXX">WhatsApp</a>
  </div>
</section>

</body>
</html>
