<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#eef2f7;
}

/* HEADER MEJORADO */
header{
  background:#1e3a8a;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
}

/* CENTRAR LOGO */
.logo{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:700;
  color:white;
}
.logo span{
  color:#ff6a00;
}

/* BOTONES DERECHA */
.header-right{
  margin-left:auto;
}

.btn{
  background:#ff6a00;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  cursor:pointer;
  margin-left:10px;
}

/* HERO */
.hero{
  height:400px;
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1920') center/cover;
  display:flex;
  align-items:center;
  padding:40px;
  color:white;
}

/* CATEGORIAS */
.categorias{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px;
}

.cat{
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.cat i{
  font-size:30px;
  color:#1e3a8a;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  color:#ff6a00;
  font-weight:700;
}

/* MODAL */
.modal{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:30px;
  border-radius:10px;
  width:300px;
}

.modal input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

.modal button{
  width:100%;
  margin-top:5px;
}

</style>
</head>

<body>

<header>

  <!-- IZQUIERDA VACIO PARA CENTRADO -->
  <div></div>

  <!-- LOGO CENTRADO -->
  <div class="logo">NORTE <span>MOTOR</span></div>

  <!-- DERECHA -->
  <div class="header-right">
    <button class="btn" onclick="abrirLogin()">Ingresar</button>
  </div>

</header>

<section class="hero">
  <h1>Encontrá tu próximo vehículo</h1>
</section>

<!-- CATEGORIAS -->
<div class="categorias">
  <div class="cat"><i class="fas fa-car"></i><p>Autos</p></div>
  <div class="cat"><i class="fas fa-truck"></i><p>Camionetas</p></div>
  <div class="cat"><i class="fas fa-motorcycle"></i><p>Motos</p></div>
  <div class="cat"><i class="fas fa-ship"></i><p>Embarcaciones</p></div>
</div>

<!-- AUTOS -->
<div id="autos" class="grid"></div>

<!-- MODAL LOGIN COMPLETO -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <h3>Acceso</h3>

    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="login()" class="btn">Ingresar</button>
    <button onclick="registro()" class="btn">Registrarse</button>
    <button onclick="recuperar()" class="btn">Recuperar contraseña</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* MODAL */
window.abrirLogin = ()=> loginModal.style.display="flex";

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,pass.value);
    alert("Bienvenido");
    loginModal.style.display="none";
  }catch(e){
    alert(e.message);
  }
};

/* REGISTRO */
window.registro = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,pass.value);
    alert("Usuario creado");
  }catch(e){
    alert(e.message);
  }
};

/* RECUPERAR */
window.recuperar = async ()=>{
  try{
    await sendPasswordResetEmail(auth,email.value);
    alert("Revisá tu email");
  }catch(e){
    alert(e.message);
  }
};

/* AUTOS */
async function cargarAutos(){
  const data = await getDocs(collection(db,"autos"));
  autos.innerHTML="";
  data.forEach(doc=>{
    const a = doc.data();
    autos.innerHTML+=`
      <div class="card">
        <img src="${a.imagen}">
        <div class="card-body">
          <h3>${a.nombre}</h3>
          <div class="price">$${a.precio}</div>
        </div>
      </div>`;
  });
}

cargarAutos();

</script>

</body>
</html>
