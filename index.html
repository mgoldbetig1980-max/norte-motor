<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f4f6f9;
}

/* HEADER */
header{
  background:#1e3a8a;
  color:white;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:22px;
  font-weight:700;
}

.logo span{
  color:#ff6a00;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:500;
}

.btn{
  background:#ff6a00;
  border:none;
  padding:10px 15px;
  color:white;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

/* HERO */
.hero{
  background:url('https://images.unsplash.com/photo-1549921296-3c0b3b36c8e1?q=80&w=1920') center/cover;
  height:500px;
  display:flex;
  align-items:center;
  padding:60px;
  color:white;
}

.hero h1{
  font-size:42px;
}

.search-box{
  margin-top:20px;
  background:white;
  padding:15px;
  border-radius:10px;
  display:flex;
  gap:10px;
}

.search-box input{
  padding:10px;
  border:none;
  outline:none;
  width:150px;
}

/* CATEGORIAS */
.categorias{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:-40px;
}

.cat{
  background:white;
  padding:20px;
  border-radius:12px;
  width:180px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body{
  padding:15px;
}

.price{
  color:#ff6a00;
  font-weight:700;
}

.footer{
  background:#1e3a8a;
  color:white;
  padding:30px;
  text-align:center;
}

/* LOGIN MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:30px;
  border-radius:10px;
}

.modal input{
  display:block;
  margin:10px 0;
  padding:10px;
  width:250px;
}

</style>
</head>

<body>

<header>
  <div class="logo">NORTE <span>MOTOR</span></div>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Autos</a>
    <a href="#">Camionetas</a>
    <a href="#">Motos</a>
    <a href="#">Embarcaciones</a>
  </nav>

  <div>
    <button class="btn" onclick="abrirLogin()">Ingresar</button>
    <button class="btn" onclick="irPublicar()">Publicar</button>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Encontrá tu próximo vehículo</h1>
    <h2>NORTE MOTOR</h2>

    <div class="search-box">
      <input placeholder="¿Qué buscás?">
      <input placeholder="Modelo">
      <input placeholder="Año">
      <input placeholder="Precio Máx">
      <button class="btn">Buscar</button>
    </div>
  </div>
</section>

<div class="categorias">
  <div class="cat">🚗 Autos</div>
  <div class="cat">🚙 Camionetas</div>
  <div class="cat">🏍️ Motos</div>
  <div class="cat">🚤 Embarcaciones</div>
</div>

<h2 style="padding:40px;">Vehículos Destacados</h2>

<div id="autos" class="grid"></div>

<div class="footer">
  © Norte Motor - Plataforma de compra y venta
</div>

<!-- LOGIN -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()" class="btn">Ingresar</button>
    <button onclick="registro()" class="btn">Registrarse</button>
    <button onclick="recuperar()" class="btn">Olvidé contraseña</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,pass.value);
    alert("Bienvenido");
    modal.style.display="none";
  }catch(e){ alert(e.message); }
}

/* REGISTRO */
window.registro = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,pass.value);
    alert("Registrado");
  }catch(e){ alert(e.message); }
}

/* RECUPERAR */
window.recuperar = async ()=>{
  await sendPasswordResetEmail(auth,email.value);
  alert("Revisá tu mail");
}

/* MODAL */
window.abrirLogin = ()=> modal.style.display="flex";

/* PUBLICAR */
window.irPublicar = ()=>{
  if(!auth.currentUser){
    alert("Debes iniciar sesión");
    return;
  }
  alert("Panel de publicación (siguiente paso)");
}

/* MOSTRAR AUTOS */
async function cargarAutos(){
  const querySnapshot = await getDocs(collection(db,"autos"));
  autos.innerHTML="";
  querySnapshot.forEach(doc=>{
    const a = doc.data();
    autos.innerHTML+=`
      <div class="card">
        <img src="${a.imagen}">
        <div class="card-body">
          <h3>${a.nombre}</h3>
          <div class="price">$${a.precio}</div>
        </div>
      </div>
    `;
  });
}

cargarAutos();

</script>

</body>
</html>
