
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}

.header{
height:260px;
background:#0a2540;
display:flex;
align-items:center;
justify-content:center;
}
.logo{
font-size:40px;
font-weight:bold;
color:white;
}
.logo span{color:#ff7a00;}

.container{display:flex;padding:30px;}

.left{width:220px;}
.left button{
width:100%;
margin-bottom:10px;
padding:12px;
background:#ff7a00;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.main{flex:1;padding-left:30px;}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}
.card:hover{transform:scale(1.03);}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{padding:15px;}

.precio{
color:#ff7a00;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">NORTE <span>MOTOR</span></div>
</div>

<div class="container">

<div class="left"></div>

<div class="main">
<h2>Vehículos publicados</h2>
<div class="grid" id="listado"></div>
</div>

</div>

<script>

/* LOGIN */
function actualizarUI(){
let user = localStorage.getItem("session");
let left = document.querySelector(".left");

if(user){
left.innerHTML = `
<button onclick="logout()">Cerrar sesión</button>
<button onclick="publicar()">Publicar</button>
`;
}else{
left.innerHTML = `
<button onclick="login()">Ingresar</button>
<button onclick="registrar()">Registrarse</button>
<button onclick="recuperar()">Recuperar contraseña</button>
`;
}
}

function login(){
let email = prompt("Email");
let pass = prompt("Contraseña");
let users = JSON.parse(localStorage.getItem("usuarios")) || [];
let ok = users.find(u=>u.email===email && u.pass===pass);
if(ok){
localStorage.setItem("session",email);
actualizarUI();
}else alert("Error al ingresar");
}

function registrar(){
let email = prompt("Email");
let pass = prompt("Contraseña");
let users = JSON.parse(localStorage.getItem("usuarios")) || [];
users.push({email,pass});
localStorage.setItem("usuarios",JSON.stringify(users));
alert("Registrado correctamente");
}

function recuperar(){
alert("Función en desarrollo");
}

function logout(){
localStorage.removeItem("session");
actualizarUI();
}

/* PUBLICAR PRO */
function publicar(){

let marca = prompt("Marca");
let modelo = prompt("Modelo");
let año = prompt("Año");
let km = prompt("Kilometraje");
let combustible = prompt("Combustible");
let transmision = prompt("Transmisión");
let precio = prompt("Precio");
let tel = prompt("WhatsApp vendedor");

/* 🔥 MULTIPLES FOTOS */
let fotos = prompt("Pegá URLs de imágenes separadas por coma");

/* convertimos a array */
let imagenes = fotos.split(",");

let desc = prompt("Descripción");

let autos = JSON.parse(localStorage.getItem("autos")) || [];

autos.push({
marca,
modelo,
año,
km,
combustible,
transmision,
precio,
tel,
imagenes,
desc,
fecha:new Date().getTime()
});

localStorage.setItem("autos",JSON.stringify(autos));
render();
}
}

/* DETALLE */
function verDetalle(index){
localStorage.setItem("detalle", index);
window.location.href = "detalle.html";
}

/* LISTADO */
function render(){
let cont = document.getElementById("listado");
cont.innerHTML="";

let autos = JSON.parse(localStorage.getItem("autos")) || [];

if(autos.length===0){
autos = [
{
marca:"Toyota",
modelo:"Hilux",
año:"2020",
km:"60000",
precio:"20000 USD",
img:"https://images.unsplash.com/photo-1552519507-da3b142c6e3d"
},
{
marca:"Ford",
modelo:"Ranger",
año:"2019",
km:"80000",
precio:"18000 USD",
img:"https://images.unsplash.com/photo-1549921296-3a6b0d64c9f6"
}
];
}

autos.forEach((a,i)=>{
cont.innerHTML += `
<div class="card" onclick="verDetalle(${i})">
<img src="${a.img}">
<div class="card-body">
<h3>${a.marca} ${a.modelo}</h3>
<p>${a.año} - ${a.km} km</p>
<div class="precio">${a.precio}</div>
</div>
</div>
`;
});
}

/* INIT */
actualizarUI();
render();

</script>

</body>
</html>
