<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Poppins';
  background:#eef2f7;
}

/* HEADER */
header{
  background:#1e3a8a;
  height:90px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.logo{
  color:white;
  font-size:28px;
  font-weight:700;
}
.logo span{color:#ff6a00}

/* HERO (SIN TEXTO DUPLICADO) */
.hero{
  height:250px;
  background:#1e3a8a;
}

/* CATEGORIAS */
.categorias{
  display:flex;
  justify-content:center;
  gap:25px;
  margin:25px;
}

.cat{
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  width:140px;
}

.cat i{
  font-size:30px;
  color:#1e3a8a;
}

/* LAYOUT */
.main{
  display:flex;
  gap:20px;
  padding:20px;
}

/* IZQUIERDA */
.sidebar{
  width:260px;
}

/* BOTONES */
.menu-btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:#ff6a00;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

/* FORMULARIOS */
.form-box{
  display:none;
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

.form-box input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

.form-box button{
  width:100%;
  padding:10px;
  background:#1e3a8a;
  color:white;
  border:none;
}

/* CONTENIDO */
.content{
  flex:1;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  color:#ff6a00;
  font-weight:700;
}

</style>
</head>

<body>

<header>
  <div class="logo">NORTE <span>MOTOR</span></div>
</header>

<section class="hero"></section>

<!-- CATEGORIAS -->
<div class="categorias">
  <div class="cat"><i class="fas fa-car"></i><p>Autos</p></div>
  <div class="cat"><i class="fas fa-truck"></i><p>Camionetas</p></div>
  <div class="cat"><i class="fas fa-motorcycle"></i><p>Motos</p></div>
  <div class="cat"><i class="fas fa-ship"></i><p>Embarcaciones</p></div>
  <div class="cat"><i class="fas fa-truck-moving"></i><p>Camiones</p></div>
</div>

<div class="main">

  <!-- IZQUIERDA -->
  <div class="sidebar">

    <button class="menu-btn" onclick="mostrar('login')">Ingresar</button>
    <button class="menu-btn" onclick="mostrar('registro')">Registrarse</button>
    <button class="menu-btn" onclick="mostrar('recuperar')">Recuperar contraseña</button>

    <!-- LOGIN -->
    <div id="loginBox" class="form-box">
      <input id="email" placeholder="Email">
      <input id="pass" type="password" placeholder="Contraseña">
      <button onclick="login()">Ingresar</button>
    </div>

    <!-- REGISTRO -->
    <div id="registroBox" class="form-box">
      <input id="email2" placeholder="Email">
      <input id="pass2" type="password">
      <button onclick="registro()">Crear cuenta</button>
    </div>

    <!-- RECUPERAR -->
    <div id="recuperarBox" class="form-box">
      <input id="email3" placeholder="Email">
      <button onclick="recuperar()">Enviar</button>
    </div>

  </div>

  <!-- DERECHA -->
  <div class="content">
    <div id="autos" class="grid"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.firebasestorage.app",
  messagingSenderId: "192628890922",
  appId: "1:192628890922:web:48bc1972f62216c3535253",
  measurementId: "G-BX1FCDC3P0"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* MOSTRAR FORM */
window.mostrar = (tipo)=>{
  loginBox.style.display="none";
  registroBox.style.display="none";
  recuperarBox.style.display="none";

  if(tipo=="login") loginBox.style.display="block";
  if(tipo=="registro") registroBox.style.display="block";
  if(tipo=="recuperar") recuperarBox.style.display="block";
};

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,pass.value);
    alert("Bienvenido");
  }catch(e){
    alert(e.message);
  }
};

/* REGISTRO */
window.registro = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email2.value,pass2.value);
    alert("Cuenta creada");
  }catch(e){
    alert(e.message);
  }
};

/* RECUPERAR */
window.recuperar = async ()=>{
  try{
    await sendPasswordResetEmail(auth,email3.value);
    alert("Revisá tu mail");
  }catch(e){
    alert(e.message);
  }
};

/* AUTOS */
async function cargarAutos(){
  const data = await getDocs(collection(db,"autos"));
  autos.innerHTML="";
  data.forEach(doc=>{
    const a = doc.data();
    autos.innerHTML+=`
      <div class="card">
        <img src="${a.imagen}">
        <div class="card-body">
          <h3>${a.nombre}</h3>
          <div class="price">$${a.precio}</div>
        </div>
      </div>`;
  });
}

cargarAutos();

</script>

</body>
</html>
