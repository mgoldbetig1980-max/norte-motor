<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial; background:#f3f4f6; }

/* HEADER */
header {
  background:#1e3a8a;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
}

header a {
  color:white;
  margin:10px;
  text-decoration:none;
}

/* HERO */
.hero {
  background:url('https://images.unsplash.com/photo-1549921296-3a6bfe57a0a9') center/cover;
  padding:100px 20px;
  color:white;
  text-align:center;
}

.hero h1 { font-size:40px; }

/* BUSCADOR */
.search {
  margin-top:20px;
}

.search input {
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:none;
}

/* CATEGORIAS */
.categorias {
  display:flex;
  justify-content:space-around;
  padding:20px;
}

.cat {
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

/* CARDS */
.section { padding:20px; }

.cars {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-body {
  padding:10px;
}

.btn {
  background:#f97316;
  color:white;
  padding:10px;
  display:block;
  text-align:center;
  text-decoration:none;
}

/* FOOTER */
footer {
  background:#1e3a8a;
  color:white;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<header>
  <strong>NORTE MOTOR</strong>
  <div>
    <a href="#">Inicio</a>
    <a href="#">Autos</a>
    <a href="#">Camionetas</a>
    <a href="#">Motos</a>
    <a href="#">Embarcaciones</a>
  </div>
</header>

<div class="hero">
  <h1>Encontrá tu próximo vehículo</h1>
  <div class="search">
    <input placeholder="¿Qué buscás?">
    <input placeholder="Precio máximo">
    <button>Buscar</button>
  </div>
</div>

<div class="categorias">
  <div class="cat">🚗 Autos</div>
  <div class="cat">🚙 Camionetas</div>
  <div class="cat">🏍️ Motos</div>
  <div class="cat">🚤 Embarcaciones</div>
</div>

<div class="section">
  <h2>Últimos publicados</h2>
  <div class="cars" id="cars"></div>
</div>

<footer>
  © Norte Motor - Todos los derechos reservados
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlaUPbwiElmfhB6LtwpfXi6q9lIgM7cFE",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db,"autos"),snap=>{
  cars.innerHTML="";
  snap.forEach(d=>{
    let a=d.data();

    cars.innerHTML+=`
    <div class="card">
      <img src="${a.img}">
      <div class="card-body">
        <h3>${a.nombre}</h3>
        <p>${a.precio}</p>
        <a class="btn" href="https://wa.me/${a.telefono}" target="_blank">
          Contactar
        </a>
      </div>
    </div>`;
  });
});
</script>

</body>
</html>
