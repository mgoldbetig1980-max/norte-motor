<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Norte Motor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f9;
}

header {
  background: #0A1F44;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  text-align: center;
  padding: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  width: 250px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  background: #F97316;
  color: white;
  border: none;
  cursor: pointer;
}

.cars {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
}

.card-body {
  padding: 15px;
}

.btn {
  background: #25D366;
  color: white;
  padding: 10px;
  text-decoration: none;
  display: inline-block;
  margin-top: 10px;
}

@media(max-width:768px){
  .cars {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>NORTE MOTOR</h1>
</header>

<div class="container">
  <h3>Login / Registro</h3>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>

  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Login</button>
</div>

<hr>

<div class="container">
  <h3>Publicar vehículo</h3>

  <input id="nombre" placeholder="Nombre del vehículo"><br>
  <input id="precio" placeholder="Precio"><br>
  <input id="img" placeholder="URL de imagen"><br>
  <input id="telefono" placeholder="Teléfono (ej: 549341XXXXXXX)"><br>

  <button onclick="publicar()">Publicar</button>
</div>

<section class="cars" id="cars"></section>

<!-- FIREBASE MODERNO -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyXXXXXXX",
  authDomain: "norte-motor.firebaseapp.com",
  projectId: "norte-motor",
  storageBucket: "norte-motor.appspot.com",
  messagingSenderId: "123456",
  appId: "1:123:web:abc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// REGISTRO
window.registrar = async function() {
  try {
    await createUserWithEmailAndPassword(auth, email.value, pass.value);
    alert("Usuario creado");
  } catch (e) {
    alert(e.message);
  }
}

// LOGIN
window.login = async function() {
  try {
    await signInWithEmailAndPassword(auth, email.value, pass.value);
    alert("Bienvenido");
  } catch (e) {
    alert(e.message);
  }
}

// PUBLICAR
window.publicar = async function() {
  if (!auth.currentUser) {
    alert("Tenés que iniciar sesión");
    return;
  }

  await addDoc(collection(db, "autos"), {
    nombre: nombre.value,
    precio: precio.value,
    img: img.value,
    telefono: telefono.value,
    user: auth.currentUser.email
  });

  alert("Auto publicado");
}

// MOSTRAR AUTOS
onSnapshot(collection(db, "autos"), (snapshot) => {
  cars.innerHTML = "";

  snapshot.forEach(doc => {
    const auto = doc.data();

    cars.innerHTML += `
      <div class="card">
        <img src="${auto.img}">
        <div class="card-body">
          <h3>${auto.nombre}</h3>
          <p>${auto.precio}</p>
          <a class="btn" href="https://wa.me/${auto.telefono}" target="_blank">
            Contactar por WhatsApp
          </a>
        </div>
      </div>
    `;
  });
});
</script>

</body>
</html>
